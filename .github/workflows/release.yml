name: Release

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    # Automatic (post-Tests) releases require a green Tests run; manual dispatch is an
    # explicit human override and stays unblocked, matching the old push-triggered behavior.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Pin to the exact commit Tests validated; falls back to github.sha for workflow_dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Attach branch at tested commit
        # Checking out a bare SHA leaves a detached HEAD; python-semantic-release v9
        # requires a real branch ref (DetachedHeadGitError otherwise) since it pushes
        # the version bump/tag back to `main`.
        run: git checkout -B main ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: false
