name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Vendor drift check
        run: |
          ./addon/anker_x1_forecast/sync_core.sh
          git diff --exit-code addon/

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Install add-on test dependencies
        run: pip install -r addon/anker_x1_forecast/requirements.txt

      - name: Run add-on tests
        run: |
          python -m pytest tests_addon/ -v --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Install add-on test dependencies
        run: pip install -r addon/anker_x1_forecast/requirements.txt

      - name: Install lint tools
        run: |
          pip install uv
          pip install pyright==1.1.394

      # ruff rev pinned to .pre-commit-config.yaml (astral-sh/ruff-pre-commit v0.15.20)
      - name: ruff check
        run: uvx ruff@0.15.20 check .

      - name: ruff format check
        run: uvx ruff@0.15.20 format --check .

      # pyright rev pinned to .pre-commit-config.yaml (RobertCraigie/pyright-python v1.1.394).
      # Unlike the pre-commit hook (isolated venv, additional_dependencies: []), this runs
      # with requirements_test.txt installed for richer import resolution; pyproject.toml's
      # reportMissingImports=false etc. make this a superset-safe difference (see B3 caveats).
      - name: pyright
        run: pyright
