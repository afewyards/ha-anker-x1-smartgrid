name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Vendor drift check
        run: |
          ./addon/anker_x1_forecast/sync_core.sh
          git diff --exit-code addon/

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Install add-on test dependencies
        run: pip install -r addon/anker_x1_forecast/requirements.txt

      - name: Run add-on tests
        run: |
          python -m pytest tests_addon/ -v --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so the diff-scoped pre-commit run below can resolve
          # both the "before" ref and HEAD~1 fallback.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Resolve diff range
        id: range
        run: |
          FROM="${{ github.event.before }}"
          TO="${{ github.sha }}"
          if [ -z "$FROM" ] || [ "$FROM" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$FROM" 2>/dev/null; then
            if git cat-file -e HEAD~1 2>/dev/null; then
              echo "::notice::No valid base commit (first push, new branch, or PR event) — falling back to --from-ref HEAD~1."
              FROM="HEAD~1"
            else
              echo "::notice::Single-commit history — nothing to diff against; skipping diff-scoped pre-commit."
              FROM=""
            fi
          fi
          echo "from=$FROM" >> "$GITHUB_OUTPUT"
          echo "to=$TO" >> "$GITHUB_OUTPUT"

      # Diff-scoped exactly like local usage (pre-commit run --from-ref/--to-ref), reusing
      # .pre-commit-config.yaml's pinned ruff/pyright revs — no hand-pinned duplicate
      # versions in this job. Repo-wide ruff/pyright runs fail today on 635 pre-existing
      # errors (legacy debt); pre-commit only ever gated changed files locally, so CI now
      # matches that contract instead of a stricter, previously-untested one.
      - name: pre-commit (diff-scoped)
        if: steps.range.outputs.from != ''
        run: pre-commit run --from-ref "${{ steps.range.outputs.from }}" --to-ref "${{ steps.range.outputs.to }}" --show-diff-on-failure
